<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LJCR Live Reference</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:wght@400;700&family=Cormorant+SC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --parchment: #F5F0E8;
            --parchment-dark: #EDE5D0;
            --burgundy: #6B2D2D;
            --burgundy-light: #8B3D3D;
            --gold: #C9A84C;
            --text-dark: #2C1810;
            --text-medium: #5C3D2E;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--parchment);
            color: var(--text-dark);
            font-family: 'EB Garamond', serif;
            min-height: 100vh;
        }

        header {
            background: var(--burgundy);
            color: var(--parchment);
            text-align: center;
            padding: 1.5rem 1rem;
            border-bottom: 3px solid var(--gold);
        }

        header h1 {
            font-family: 'Cormorant SC', serif;
            font-size: 2.1rem;
            letter-spacing: 0.08em;
            color: var(--parchment);
        }

        header p {
            font-family: 'EB Garamond', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: var(--gold);
            margin-top: 0.25rem;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        #status {
            text-align: center;
            font-style: italic;
            color: var(--text-medium);
            margin-bottom: 1.5rem;
            font-size: 1.15rem;
        }

        #entries {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .entry {
            background: var(--parchment-dark);
            border-left: 4px solid var(--burgundy);
            padding: 1.25rem 1.5rem;
            border-radius: 0 4px 4px 0;
        }

        .entry-label {
            font-family: 'Cormorant SC', serif;
            font-size: 1.15rem;
            color: var(--burgundy);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .entry-content {
            font-size: 1.4rem;
            line-height: 1.65;
            color: var(--text-dark);
            white-space: pre-wrap;
        }

        #empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-medium);
            font-style: italic;
            font-size: 1.3rem;
            display: none;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            border-top: 1px solid var(--parchment-dark);
            color: var(--text-medium);
            font-style: italic;
            font-size: 1.05rem;
            margin-top: 3rem;
        }

        /* Admin trigger — invisible corner tap */
        #admin-trigger {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 40px;
            height: 40px;
            cursor: default;
            opacity: 0;
            z-index: 999;
        }

        /* Admin overlay */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(44, 24, 16, 0.97);
            z-index: 1000;
            padding: 2rem 1rem;
            overflow-y: auto;
        }

        #admin-panel.active { display: block; }

        #admin-content {
            max-width: 680px;
            margin: 0 auto;
            background: var(--parchment);
            border-radius: 6px;
            padding: 2rem;
        }

        #admin-content h2 {
            font-family: 'Cormorant SC', serif;
            color: var(--burgundy);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            border-bottom: 2px solid var(--burgundy);
            padding-bottom: 0.75rem;
        }

        #auth-section {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        #user-info {
            font-size: 1.05rem;
            color: var(--text-medium);
            margin-bottom: 0.75rem;
            font-style: italic;
        }

        .admin-field {
            margin-bottom: 1rem;
        }

        .admin-field label {
            display: block;
            font-family: 'Cormorant SC', serif;
            color: var(--burgundy);
            font-size: 1.05rem;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }

        .admin-field input,
        .admin-field textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--burgundy);
            background: white;
            font-family: 'EB Garamond', serif;
            font-size: 1.15rem;
            border-radius: 3px;
            color: var(--text-dark);
        }

        .admin-field textarea {
            height: 130px;
            resize: vertical;
        }

        .admin-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1.25rem;
        }

        .btn {
            padding: 0.6rem 1.25rem;
            border: none;
            border-radius: 3px;
            font-family: 'EB Garamond', serif;
            font-size: 1.15rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.82; }

        .btn-primary { background: var(--burgundy); color: var(--parchment); }
        .btn-danger { background: #7A0000; color: white; }
        .btn-secondary {
            background: var(--parchment-dark);
            color: var(--text-dark);
            border: 1px solid var(--burgundy);
        }

        #admin-entries-list {
            margin-top: 1.75rem;
            border-top: 1px solid var(--parchment-dark);
            padding-top: 1rem;
        }

        #admin-entries-list h3 {
            font-family: 'Cormorant SC', serif;
            color: var(--burgundy);
            font-size: 1.15rem;
            margin-bottom: 0.75rem;
        }

        .admin-entry {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--parchment-dark);
            font-size: 1.1rem;
        }

        .admin-entry-text { flex: 1; line-height: 1.4; }

        .btn-small {
            padding: 0.2rem 0.55rem;
            font-size: 0.82rem;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>Lord Jesus Christ Reigns</h1>
    <p>Live Reference · Sub tutela Dei</p>
</header>

<main>
    <div id="status">Connecting...</div>
    <div id="entries"></div>
    <div id="empty-state">No references have been posted yet.</div>
</main>

<footer>
    lordjesuschristreigns.blog &nbsp;·&nbsp; Sub tutela Dei
</footer>

<!-- Invisible admin trigger — bottom-right corner -->
<div id="admin-trigger" ondblclick="openAdmin()"></div>

<!-- Admin Panel -->
<div id="admin-panel">
    <div id="admin-content">
        <h2>LJCR · Admin Panel</h2>

        <div id="auth-section">
            <div id="user-info" style="display:none;"></div>
            <button id="sign-in-btn" class="btn btn-primary" onclick="signIn()">Sign in with Google</button>
            <button id="sign-out-btn" class="btn btn-secondary" style="display:none;" onclick="signOut()">Sign out</button>
        </div>

        <div id="admin-form" style="display:none;">
            <div class="admin-field">
                <label>Label (optional)</label>
                <input type="text" id="entry-label" placeholder="e.g. Quran 4:157 · Ibn Kathir · p. 42">
            </div>
            <div class="admin-field">
                <label>Reference / Content</label>
                <textarea id="entry-content" placeholder="Paste your reference, quote, or note here..."></textarea>
            </div>
            <div class="admin-buttons">
                <button class="btn btn-primary" onclick="addEntry()">Post Reference</button>
                <button class="btn btn-danger" onclick="clearAll()">Clear All</button>
                <button class="btn btn-secondary" onclick="closeAdmin()">Close Panel</button>
            </div>

            <div id="admin-entries-list" style="display:none;">
                <h3>Posted References</h3>
                <div id="admin-entries-inner"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getDatabase, ref, push, remove, onValue, set } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCKf_4CUrQYeOD4FhgXlvA62qHpqhgvbt0",
        authDomain: "ljcr-live-reference.firebaseapp.com",
        databaseURL: "https://ljcr-live-reference-default-rtdb.firebaseio.com",
        projectId: "ljcr-live-reference",
        storageBucket: "ljcr-live-reference.firebasestorage.app",
        messagingSenderId: "398253643663",
        appId: "1:398253643663:web:07e9433cac06ba8e5addfa"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    const entriesRef = ref(db, 'entries');

    // Real-time listener — public view
    onValue(entriesRef, (snapshot) => {
        document.getElementById('status').style.display = 'none';
        const data = snapshot.val();
        renderPublic(data);
        if (currentUser) renderAdminList(data);
    });

    function renderPublic(data) {
        const container = document.getElementById('entries');
        const empty = document.getElementById('empty-state');
        container.innerHTML = '';
        if (!data) { empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        Object.entries(data).reverse().forEach(([key, entry]) => {
            const div = document.createElement('div');
            div.className = 'entry';
            div.innerHTML = `
                ${entry.label ? `<div class="entry-label">${entry.label}</div>` : ''}
                <div class="entry-content">${entry.content}</div>
            `;
            container.appendChild(div);
        });
    }

    function renderAdminList(data) {
        const list = document.getElementById('admin-entries-inner');
        const wrapper = document.getElementById('admin-entries-list');
        list.innerHTML = '';
        if (!data) { wrapper.style.display = 'none'; return; }
        wrapper.style.display = 'block';
        Object.entries(data).reverse().forEach(([key, entry]) => {
            const div = document.createElement('div');
            div.className = 'admin-entry';
            const preview = entry.content.substring(0, 90) + (entry.content.length > 90 ? '…' : '');
            div.innerHTML = `
                <div class="admin-entry-text">
                    ${entry.label ? `<strong>${entry.label}</strong> — ` : ''}${preview}
                </div>
                <button class="btn btn-danger btn-small" data-key="${key}">Delete</button>
            `;
            div.querySelector('button').addEventListener('click', () => deleteEntry(key));
            list.appendChild(div);
        });
    }

    // Auth state
    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
            document.getElementById('sign-in-btn').style.display = 'none';
            document.getElementById('sign-out-btn').style.display = 'inline-block';
            document.getElementById('admin-form').style.display = 'block';
            const info = document.getElementById('user-info');
            info.style.display = 'block';
            info.textContent = `Signed in as ${user.email}`;
        } else {
            document.getElementById('sign-in-btn').style.display = 'inline-block';
            document.getElementById('sign-out-btn').style.display = 'none';
            document.getElementById('admin-form').style.display = 'none';
            document.getElementById('user-info').style.display = 'none';
        }
    });

    // Global functions
    window.signIn = async () => {
        try { await signInWithPopup(auth, provider); }
        catch (e) { alert('Sign-in failed: ' + e.message); }
    };

    window.signOut = async () => { await fbSignOut(auth); };

    window.addEntry = async () => {
        if (!currentUser) return alert('Please sign in first.');
        const label = document.getElementById('entry-label').value.trim();
        const content = document.getElementById('entry-content').value.trim();
        if (!content) return alert('Content cannot be empty.');
        try {
            await push(entriesRef, { label, content, timestamp: Date.now() });
            document.getElementById('entry-label').value = '';
            document.getElementById('entry-content').value = '';
        } catch (e) { alert('Error: ' + e.message); }
    };

    window.deleteEntry = async (key) => {
        if (!currentUser) return;
        await remove(ref(db, `entries/${key}`));
    };

    window.clearAll = async () => {
        if (!currentUser) return;
        if (!confirm('Clear ALL references from the public display?')) return;
        await set(entriesRef, null);
    };

    window.openAdmin = () => {
        document.getElementById('admin-panel').classList.add('active');
    };

    window.closeAdmin = () => {
        document.getElementById('admin-panel').classList.remove('active');
    };

    // Secret keyboard shortcut: Ctrl + Shift + A
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.shiftKey && e.key === 'A') {
            document.getElementById('admin-panel').classList.toggle('active');
        }
    });
</script>

</body>
</html>
